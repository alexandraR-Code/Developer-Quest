<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TEAM CODER EXPERIENCE - Bienvenida</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="bienvenida.css">
</head>
<body class="pagina-bienvenida">

  <div class="tarjeta-bienvenida">
    <div class="logo-marca logo-marca--grande"><i class="fa-solid fa-code"></i></div>
    <h1>TEAM CODER EXPERIENCE</h1>
    <p class="subtitulo-bienvenida">Aprende HTML, CSS y JavaScript jugando, reto a reto.</p>

    <form id="formularioBienvenida">
      <label for="campoNombre">¿Cómo te llamas?</label>
      <input type="text" id="campoNombre" placeholder="Escribe tu nombre" autocomplete="off" maxlength="40" required>
      <span class="ayuda-campo">
        <i class="fa-solid fa-circle-info"></i>
        Lo usaremos para tu certificado al terminar el programa.
      </span>

      <button type="submit" class="boton-estado boton-comenzar-aventura">
        Comenzar la aventura <i class="fa-solid fa-arrow-right"></i>
      </button>
    </form>
  </div>

  <script src="preferencias.js"></script>
  <script src="bienvenida.js"></script>
</body>
</html>
